<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Data Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }
        .name {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: 'Cursive', sans-serif;
            font-size: 2em;
            color: #000;
            font-weight: bold;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.5);
        }
        h1 {
            color: #4A90E2;
            text-align: center;
            font-size: 1.8em;
        }
        form {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1em;
        }
        button {
            background-color: #4A90E2;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover {
            background-color: #357ABD;
        }
        #qrcode {
            margin-top: 20px;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #888;
            text-align: center;
        }

        /* Media Queries */
        @media (max-width: 768px) {
            .name {
                font-size: 1.5em;
                top: 5px;
                left: 5px;
            }
            h1 {
                font-size: 1.5em;
            }
            form {
                padding: 15px;
                width: 95%;
            }
            input {
                font-size: 0.9em;
            }
            button {
                font-size: 0.9em;
                padding: 8px 16px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.3em;
            }
            input {
                font-size: 0.8em;
            }
            button {
                font-size: 0.8em;
                padding: 7px 14px;
            }
            .footer {
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <div class="name">𝓐𝓜𝓖𝓐𝓓🖤</div>

    <h1>Student Data Registration</h1>
    <form id="studentForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>
        
        <label for="id">Student ID:</label>
        <input type="text" id="id" name="id" placeholder="Enter your student ID" required>

        <label for="schedule">Schedule (From - To):</label>
        <input type="text" id="schedule" name="schedule" placeholder="e.g., 8:00 AM - 2:00 PM" required>

        <button type="submit">Generate QR Code</button>
    </form>
    <h2>Your QR Code:</h2>
    <canvas id="qrcode"></canvas>
    <div class="footer">© 2024 - Your Website</div>

    <!-- QR Code library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script>
        const form = document.getElementById('studentForm');
        const qrCanvas = document.getElementById('qrcode');

        form.addEventListener('submit', (event) => {
            event.preventDefault(); // Prevent page reload
            const name = document.getElementById('name').value.trim();
            const id = document.getElementById('id').value.trim();
            const schedule = document.getElementById('schedule').value.trim();

            if (name && id && schedule) {
                qrCanvas.innerHTML = ""; // Clear previous QR code
                // Create JSON object
                const qrData = JSON.stringify({
                    name: name,
                    studentId: id,
                    schedule: schedule
                });
                // Generate QR code using JSON data
                QRCode.toCanvas(qrCanvas, qrData, { width: 200 }, (error) => {
                    if (error) {
                        console.error(error);
                        alert("An error occurred while generating the QR code.");
                    }
                });
            } else {
                alert("Please fill in all the fields.");
            }
        });
    </script>
</body>
</html>
